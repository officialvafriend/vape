<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>베이프렌드 액상 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f2f8;color:#1a1a1a}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.hd{padding:14px 16px;background:#2e3a8c;color:#fff;position:sticky;top:0;z-index:10}
.hd h1{font-size:16px;font-weight:700}
.hd p{font-size:11px;opacity:.8;margin-top:2px}
.tabs{display:flex;border-bottom:1px solid #eee}
.tab{flex:1;text-align:center;padding:12px 0;font-size:13px;font-weight:600;color:#aaa;cursor:pointer;border-bottom:2px solid transparent}
.tab.ac{color:#2e3a8c;border-bottom-color:#2e3a8c}
.sec{display:none;padding:14px 16px 40px}
.sec.ac{display:block}
.row{margin-bottom:12px}
.row label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:5px}
.row input,.row select{width:100%;padding:10px 12px;font-size:14px;border-radius:10px;border:1.5px solid #e8e8e8;background:#f8f8f8;outline:none;font-family:inherit}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:8px 14px;border-radius:20px;border:1.5px solid #e8e8e8;background:#fff;font-size:13px;cursor:pointer;color:#666}
.chip.ac{background:#2e3a8c;border-color:#2e3a8c;color:#fff}
.btnrow{display:flex;gap:8px;margin-top:18px}
.btn{flex:1;padding:13px;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer}
.btn.save{background:#2e3a8c;color:#fff}
.btn.del{background:#fff;color:#c62828;border:1.5px solid #c62828}
.list{padding:8px 16px 40px}
.item{background:#fff;border:1.5px solid #eee;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.item:active{background:#f8f8f8}
.item .n{font-size:14px;font-weight:700}
.item .meta{font-size:11px;color:#999;margin-top:2px}
.item .arrow{color:#ccc}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:100;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.empty{text-align:center;color:#aaa;font-size:13px;padding:40px 0}
.search{padding:10px 16px 0}
.search input{width:100%;padding:10px 12px;font-size:14px;border-radius:10px;border:1.5px solid #e8e8e8;background:#f8f8f8;outline:none}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <h1>⚙️ 베이프렌드 액상 관리자</h1>
    <p>빈칸을 채우면 사이트에 바로 반영돼요</p>
  </div>
  <div class="tabs">
    <div class="tab ac" id="t0">목록</div>
    <div class="tab" id="t1">새로 추가</div>
  </div>

  <div class="sec ac" id="s0">
    <div class="search"><input id="q" placeholder="액상명 검색"></div>
    <div class="list" id="list"><div class="empty">불러오는 중...</div></div>
  </div>

  <div class="sec" id="s1">
    <div class="row"><label>액상명 *</label><input id="f_n" placeholder="예: 제로닉 거봉"></div>
    <div class="row"><label>브랜드</label><input id="f_b" placeholder="예: 무무"></div>
    <div class="row"><label>맛</label><input id="f_f" placeholder="예: 포도"></div>
    <div class="row"><label>라인</label>
      <div class="chips" id="cChips">
        <div class="chip" data-v="프리미엄 라인">프리미엄 라인</div>
        <div class="chip" data-v="프라임 라인">프라임 라인</div>
      </div>
    </div>
    <div class="row"><label>종류 (복수 선택 가능)</label>
      <div class="chips" id="tChips">
        <div class="chip" data-v="일반">일반</div>
        <div class="chip" data-v="노멘솔">노멘솔</div>
        <div class="chip" data-v="무니코틴">무니코틴</div>
      </div>
    </div>
    <div class="btnrow">
      <button class="btn save" id="saveBtn">저장</button>
      <button class="btn del" id="delBtn" style="display:none">삭제</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7_3DBk_st-ALx7rKQw3A19C79PH3ZOmHyehJNXPaateeL5vdtJTuKW9JAIvBbo-A/exec";
var DATA = [];
var editId = null;
var selC = "";
var selT = [];

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(function(){ t.className = 'toast'; }, 2000);
}

function showTab(n){
  document.getElementById('t0').className = 'tab' + (n===0?' ac':'');
  document.getElementById('t1').className = 'tab' + (n===1?' ac':'');
  document.getElementById('s0').className = 'sec' + (n===0?' ac':'');
  document.getElementById('s1').className = 'sec' + (n===1?' ac':'');
}
document.getElementById('t0').addEventListener('click', function(){ showTab(0); });
document.getElementById('t1').addEventListener('click', function(){ clearForm(); showTab(1); });

document.getElementById('cChips').addEventListener('click', function(e){
  var chip = e.target.closest('.chip');
  if(!chip) return;
  selC = chip.getAttribute('data-v');
  Array.prototype.forEach.call(document.querySelectorAll('#cChips .chip'), function(c){
    c.className = 'chip' + (c.getAttribute('data-v')===selC ? ' ac' : '');
  });
});
document.getElementById('tChips').addEventListener('click', function(e){
  var chip = e.target.closest('.chip');
  if(!chip) return;
  var v = chip.getAttribute('data-v');
  var idx = selT.indexOf(v);
  if(idx >= 0) selT.splice(idx, 1); else selT.push(v);
  Array.prototype.forEach.call(document.querySelectorAll('#tChips .chip'), function(c){
    c.className = 'chip' + (selT.indexOf(c.getAttribute('data-v'))>=0 ? ' ac' : '');
  });
});

function clearForm(){
  editId = null;
  document.getElementById('f_n').value = '';
  document.getElementById('f_b').value = '';
  document.getElementById('f_f').value = '';
  selC = ''; selT = [];
  Array.prototype.forEach.call(document.querySelectorAll('#cChips .chip, #tChips .chip'), function(c){ c.className = 'chip'; });
  document.getElementById('delBtn').style.display = 'none';
}

function fillForm(d){
  editId = d.id;
  document.getElementById('f_n').value = d.n || '';
  document.getElementById('f_b').value = d.b || '';
  document.getElementById('f_f').value = d.f || '';
  selC = d.c || '';
  selT = (d.t || '').split(',').filter(Boolean);
  Array.prototype.forEach.call(document.querySelectorAll('#cChips .chip'), function(c){
    c.className = 'chip' + (c.getAttribute('data-v')===selC ? ' ac' : '');
  });
  Array.prototype.forEach.call(document.querySelectorAll('#tChips .chip'), function(c){
    c.className = 'chip' + (selT.indexOf(c.getAttribute('data-v'))>=0 ? ' ac' : '');
  });
  document.getElementById('delBtn').style.display = 'block';
  showTab(1);
}

function renderList(){
  var q = document.getElementById('q').value.toLowerCase();
  var box = document.getElementById('list');
  var filtered = DATA.filter(function(d){
    return !q || (d.n||'').toLowerCase().indexOf(q) >= 0 || (d.b||'').toLowerCase().indexOf(q) >= 0;
  });
  if(!filtered.length){ box.innerHTML = '<div class="empty">액상이 없어요</div>'; return; }
  var h = '';
  for(var i=0;i<filtered.length;i++){
    var d = filtered[i];
    h += '<div class="item" data-id="'+d.id+'"><div><div class="n">'+d.n+'</div><div class="meta">'+(d.b||'')+' · '+(d.c||'')+' · '+(d.t||'')+'</div></div><div class="arrow">›</div></div>';
  }
  box.innerHTML = h;
  Array.prototype.forEach.call(box.querySelectorAll('.item'), function(el){
    el.addEventListener('click', function(){
      var id = el.getAttribute('data-id');
      var d = DATA.find(function(x){ return x.id === id; });
      if(d) fillForm(d);
    });
  });
}
document.getElementById('q').addEventListener('input', renderList);

async function loadData(){
  try{
    var res = await fetch(SCRIPT_URL + '?sheet=liquid');
    DATA = await res.json();
    renderList();
  }catch(e){
    document.getElementById('list').innerHTML = '<div class="empty">불러오기 실패. 새로고침 해보세요.</div>';
  }
}
loadData();

document.getElementById('saveBtn').addEventListener('click', async function(){
  var n = document.getElementById('f_n').value.trim();
  if(!n){ toast('액상명을 입력해주세요'); return; }
  var item = {
    id: editId || ('liq_' + Date.now()),
    n: n,
    b: document.getElementById('f_b').value.trim(),
    f: document.getElementById('f_f').value.trim(),
    c: selC,
    t: selT.join(',')
  };
  this.disabled = true;
  this.textContent = '저장 중...';
  try{
    var res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'save', sheet:'liquid', item:item}) });
    var json = await res.json();
    if(json.ok){
      toast('저장됐어요!');
      await loadData();
      showTab(0);
    } else {
      toast('저장 실패했어요');
    }
  }catch(e){
    toast('오류: ' + e.message);
  }
  this.disabled = false;
  this.textContent = '저장';
});

document.getElementById('delBtn').addEventListener('click', async function(){
  if(!editId) return;
  if(!confirm('정말 삭제하시겠어요?')) return;
  this.disabled = true;
  try{
    var res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'delete', sheet:'liquid', id:editId}) });
    var json = await res.json();
    if(json.ok){
      toast('삭제됐어요');
      await loadData();
      showTab(0);
    } else {
      toast('삭제 실패했어요');
    }
  }catch(e){
    toast('오류: ' + e.message);
  }
  this.disabled = false;
});
</script>
</body>
</html>
