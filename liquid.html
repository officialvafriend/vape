<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f2f8;color:#1a1a1a}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.hd{padding:14px 16px 0;background:#fff;position:sticky;top:0;z-index:10;border-bottom:1px solid #eee;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.hd h1{font-size:16px;font-weight:700}
.hd p{font-size:11px;color:#888;margin-top:2px;margin-bottom:10px}
.tr{display:flex}
.tb{flex:1;text-align:center;padding:9px 0;font-size:13px;font-weight:600;color:#aaa;border-bottom:2px solid transparent;cursor:pointer}
.tb.on{color:#2e3a8c;border-bottom-color:#2e3a8c}
.sw{padding:10px 16px 0;position:relative}
.sw input{width:100%;padding:10px 12px 10px 36px;font-size:14px;border-radius:12px;border:1.5px solid #e8e8e8;background:#f8f8f8;outline:none}
.si{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:16px;color:#aaa}
.fs{padding:8px 16px 4px}
.fl{font-size:11px;color:#888;font-weight:600;margin-bottom:5px}
.chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid #e8e8e8;background:#fff;color:#555;cursor:pointer}
.chip.on{background:#2e3a8c;border-color:#2e3a8c;color:#fff}
.cb{padding:6px 16px 2px;font-size:12px;color:#888}
.cb b{color:#2e3a8c}
.list{padding:8px 12px 40px;display:flex;flex-direction:column;gap:6px}
.item{display:flex;align-items:flex-start;padding:11px 14px;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #f0f0f0}
.il{flex:1;min-width:0}
.in{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.if2{font-size:11px;color:#666}
.bgs{display:flex;gap:4px;flex-shrink:0;margin-left:8px;flex-direction:column;align-items:flex-end}
.bg{font-size:10px;padding:3px 7px;border-radius:8px;font-weight:600;white-space:nowrap}
.bp{background:#e8ecff;color:#2e3a8c}
.bpr{background:#e8f8ef;color:#1a7a40}
.bn{background:#fff0e0;color:#b05a00}
.bm{background:#f0e8ff;color:#6a1a9a}
.empty{text-align:center;padding:3rem 1rem;color:#aaa;font-size:14px}
</style>

document.getElementById("total-count").textContent = "총 " + D.length + "종 취급중";

var allBrands = ["전체"].concat([...new Set(D.map(function(d){return d.b}))].sort());
var premBrands = ["전체"].concat([...new Set(D.filter(function(d){return d.c==="프리미엄 라인"}).map(function(d){return d.b}))].sort());
var primeBrands = ["전체"].concat([...new Set(D.filter(function(d){return d.c==="프라임 라인"}).map(function(d){return d.b}))].sort());

var cTab="all", cTypes=[], cBrand="전체";

function render() {
  var q = document.getElementById("qi").value.toLowerCase();
  var fl = D.filter(function(d) {
    if (cTab !== "all" && d.c !== cTab) return false;
    if (cTypes.length > 0 && !cTypes.some(function(ct){ return d.t.indexOf(ct) >= 0; })) return false;
    if (cBrand !== "전체" && d.b !== cBrand) return false;
    if (q && d.n.toLowerCase().indexOf(q) < 0 && d.f.toLowerCase().indexOf(q) < 0) return false;
    return true;
  });
  document.getElementById("cb").innerHTML = "<b>" + fl.length + "종</b> 표시중";
  if (!fl.length) {
    document.getElementById("list").innerHTML = "<div class='empty'>검색 결과가 없어요</div>";
    return;
  }
  document.getElementById("list").innerHTML = fl.map(function(d) {
    var cb = d.c === "프리미엄 라인" ? "bp" : "bpr";
    var cl = d.c === "프리미엄 라인" ? "프리미엄" : "프라임";
    var typeTags = "";
    for(var ti=0;ti<d.t.length;ti++){
      if(d.t[ti]==="노멘솔") typeTags += "<span class='bg bn'>노멘솔</span>";
      else if(d.t[ti]==="무니코틴") typeTags += "<span class='bg bm'>무니코틴</span>";
    }
    return "<div class='item'><div class='il'><div class='in'>" + d.n + "</div><div class='if2'>🍬 " + d.f + " · " + d.b + "</div></div><div class='bgs'><span class='bg " + cb + "'>" + cl + "</span>" + typeTags + "</div></div>";
  }).join("");
}

function buildBrands() {
  var brands = cTab === "프리미엄 라인" ? premBrands : (cTab === "프라임 라인" ? primeBrands : allBrands);
  document.getElementById("bc").innerHTML = brands.map(function(b) {
    var label = b === "전체" ? "전체 브랜드" : b;
    return "<div class='chip" + (b === cBrand ? " on" : "") + "' data-brand='" + b + "'>" + label + "</div>";
  }).join("");
}

function updateTypeChips() {
  document.querySelectorAll("#tc .chip").forEach(function(c) {
    var t = c.dataset.type;
    if (t === "전체") {
      c.className = "chip" + (cTypes.length === 0 ? " on" : "");
    } else {
      c.className = "chip" + (cTypes.indexOf(t) >= 0 ? " on" : "");
    }
  });
}

document.getElementById("tabs").addEventListener("click", function(e) {
  var el = e.target.closest(".tb");
  if (!el) return;
  cTab = el.dataset.tab;
  cBrand = "전체";
  document.querySelectorAll(".tb").forEach(function(t) { t.className = "tb" + (t.dataset.tab === cTab ? " on" : ""); });
  buildBrands();
  render();
});

document.getElementById("tc").addEventListener("click", function(e) {
  var el = e.target.closest(".chip");
  if (!el) return;
  var t = el.dataset.type;
  if (t === "전체") {
    cTypes = [];
  } else {
    var idx = cTypes.indexOf(t);
    if (idx >= 0) {
      cTypes.splice(idx, 1);
    } else {
      cTypes.push(t);
    }
  }
  updateTypeChips();
  render();
});

document.getElementById("bc").addEventListener("click", function(e) {
  var el = e.target.closest(".chip");
  if (!el) return;
  cBrand = el.dataset.brand;
  document.querySelectorAll("#bc .chip").forEach(function(c) { c.className = "chip" + (c.dataset.brand === cBrand ? " on" : ""); });
  render();
});

document.getElementById("qi").addEventListener("input", render);

buildBrands();
render();
</script>
</body>
</html>
