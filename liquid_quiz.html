<!DOCTYPE html>
<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>베이프렌드 액상 시험</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f2f8;color:#1a1a1a}
.app{max-width:480px;margin:0 auto;min-height:100vh}
.hd{background:linear-gradient(135deg,#2e3a8c,#1a2460);padding:20px 16px;color:#fff;text-align:center}
.hd h1{font-size:18px;font-weight:700;margin-bottom:4px}
.hd p{font-size:12px;opacity:.8}
.progress-bar{background:rgba(255,255,255,.2);height:4px;border-radius:2px;margin-top:14px}
.progress-fill{background:#fff;height:4px;border-radius:2px;transition:width .3s}
.score-bar{display:flex;justify-content:space-between;font-size:11px;opacity:.8;margin-top:6px}
.body{padding:12px}
.q-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.q-num{font-size:10px;font-weight:700;color:#2e3a8c;text-transform:uppercase;margin-bottom:6px}
.q-type{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-bottom:8px;font-weight:600}
.qt-flavor{background:#e8f0ff;color:#2e3a8c}
.qt-brand{background:#e8f8ef;color:#1a7a40}
.qt-cat{background:#fff0e0;color:#b05a00}
.qt-type{background:#f0e8ff;color:#6a1a9a}
.q-text{font-size:14px;font-weight:600;color:#1a1a1a;line-height:1.5;margin-bottom:12px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;padding:10px 14px;border-radius:12px;border:1.5px solid #e8e8e8;background:#fff;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.opt:active{transform:scale(.98)}
.opt.selected{border-color:#2e3a8c;background:#f0f3ff}
.opt.correct{border-color:#2a9d5c;background:#e8f8ef}
.opt.wrong{border-color:#e03030;background:#fff0f0}
.opt-check{width:20px;height:20px;border-radius:6px;border:1.5px solid #ddd;flex-shrink:0;margin-right:10px;display:flex;align-items:center;justify-content:center;font-size:12px}
.opt.selected .opt-check{border-color:#2e3a8c;background:#2e3a8c;color:#fff}
.opt.correct .opt-check{border-color:#2a9d5c;background:#2a9d5c;color:#fff}
.opt.wrong .opt-check{border-color:#e03030;background:#e03030;color:#fff}
.opt-text{font-size:13px;color:#333}
.feedback{margin-top:8px;padding:8px 12px;border-radius:10px;font-size:12px;display:none}
.feedback.show{display:block}
.feedback.ok{background:#e8f8ef;color:#1a7a40}
.feedback.ng{background:#fff0f0;color:#c03030}
.btn-row{padding:0 12px 30px;display:flex;flex-direction:column;gap:8px}
.btn{width:100%;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer}
.btn-submit{background:#2e3a8c;color:#fff}
.btn-submit:disabled{background:#ccc;cursor:default}
.btn-retry{background:#fff;color:#2e3a8c;border:2px solid #2e3a8c}
.result-card{background:#fff;border-radius:20px;padding:24px;margin:12px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.result-emoji{font-size:48px;margin-bottom:12px}
.result-score{font-size:36px;font-weight:800;color:#2e3a8c;margin-bottom:4px}
.result-msg{font-size:14px;color:#666;margin-bottom:16px}
.result-detail{display:flex;justify-content:center;gap:24px;padding:16px;background:#f8f8f8;border-radius:12px;margin-bottom:16px}
.result-detail div{text-align:center}
.result-detail .num{font-size:20px;font-weight:700}
.result-detail .lbl{font-size:11px;color:#888;margin-top:2px}
.wrong-list{text-align:left;margin-top:12px}
.wrong-list h3{font-size:13px;font-weight:700;color:#c03030;margin-bottom:8px}
.wrong-item{background:#fff0f0;border-radius:10px;padding:10px;margin-bottom:6px;font-size:12px}
.wrong-item .wq{color:#333;margin-bottom:3px;font-weight:600}
.wrong-item .wa{color:#2a9d5c}
.wrong-item .wm{color:#c03030}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <h1>🧪 베이프렌드 액상 시험</h1>

    <div class="score-bar"><span id="prog-txt">0 / 30</span><span id="score-txt">0점</span></div>
  </div>
  <div class="body" id="body"></div>
  <div class="btn-row" id="btn-row">
    <button class="btn btn-submit" id="btn-submit" onclick="submitAll()" disabled>채점하기</button>
  </div>
</div>

  {n:"파이 아이스멘솔",b:"파이",c:"프라임 라인",t:"일반",f:"멘솔"},
  {n:"프라임 파워멘솔",b:"프라임",c:"프라임 라인",t:"일반",f:"멘솔"},
  {n:"프라임 아이스레몬",b:"프라임",c:"프라임 라인",t:"일반",f:"레몬"},
  {n:"프라임 쿨툰드라",b:"프라임",c:"프라임 라인",t:"일반",f:"베리향"}
];

// 문제 유형 정의
function makeQ(item, all) {
  var r = Math.random();
  var others = all.filter(function(x){return x.n !== item.n;});
  function rnd(arr,n){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a.slice(0,n);}

  if (r < 0.4) {
    // 맛 설명 → 액상명
    var wrongs = rnd(others,3).map(function(x){return x.n;});
    var opts = rnd([item.n].concat(wrongs),4);
    return {q:"🍬 맛: <b>"+item.f+"</b><br>이 맛의 액상명은?", ans:item.n, opts:opts, type:"맛→이름", tc:"qt-flavor"};
  } else if (r < 0.7) {
    // 액상명 → 맛 설명
    var wrongs = rnd(others.map(function(x){return x.f;}),3);
    var opts = rnd([item.f].concat(wrongs),4);
    return {q:"📦 <b>"+item.n+"</b><br>이 액상의 맛은?", ans:item.f, opts:opts, type:"이름→맛", tc:"qt-brand"};
  } else if (r < 0.85) {
    // 브랜드 → 대표 액상
    var sameB = all.filter(function(x){return x.b===item.b && x.n!==item.n;});
    if(sameB.length < 1) {
      var wrongs = rnd(others,3).map(function(x){return x.n;});
      var opts = rnd([item.n].concat(wrongs),4);
      return {q:"🍬 맛: <b>"+item.f+"</b><br>이 맛의 액상명은?", ans:item.n, opts:opts, type:"맛→이름", tc:"qt-flavor"};
    }
    var wrongBrands = [...new Set(others.filter(function(x){return x.b!==item.b;}).map(function(x){return x.b;}))];
    var wb = rnd(wrongBrands,3);
    var opts = rnd([item.b].concat(wb),4);
    return {q:"📋 <b>"+item.n+"</b><br>이 액상의 브랜드는?", ans:item.b, opts:opts, type:"이름→브랜드", tc:"qt-brand"};
  } else {
    // 프리미엄/프라임 구분
    var wrongCat = item.c === "프리미엄 라인" ? "프라임 라인" : "프리미엄 라인";
    var opts = ["프리미엄 라인","프라임 라인","프리미엄 라인 (한정)","프라임 라인 (시즌)"];
    return {q:"🏷 <b>"+item.n+"</b><br>이 액상은 어느 라인?", ans:item.c, opts:rnd(opts,4), type:"라인구분", tc:"qt-cat"};
  }
}

// 랜덤 30문제 생성
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

var pool = shuffle(D).slice(0,30);
var Qs = pool.map(function(item){return makeQ(item,D);});
var answers = {};
var submitted = false;

function buildUI(){
  var html = "";
  Qs.forEach(function(q,i){
    html += "<div class='q-card' id='qc"+i+"'>";
    html += "<div class='q-num'>Q"+( i+1)+"</div>";
    html += "<span class='q-type "+q.tc+"'>"+q.type+"</span>";
    html += "<div class='q-text'>"+q.q+"</div>";
    html += "<div class='opts' id='opts"+i+"'>";
    q.opts.forEach(function(opt,j){
      html += "<div class='opt' id='opt"+i+"_"+j+"' data-q='"+i+"' data-opt='"+opt.replace(/'/g,"&#39;")+"'>";
      html += "<div class='opt-check' id='chk"+i+"_"+j+"'></div>";
      html += "<span class='opt-text'>"+opt+"</span></div>";
    });
    html += "</div>";
    html += "<div class='feedback' id='fb"+i+"'></div>";
    html += "</div>";
  });
  document.getElementById("body").innerHTML = html;

  // 이벤트 등록
  document.getElementById("body").addEventListener("click", function(e){
    if(submitted) return;
    var el = e.target.closest(".opt");
    if(!el) return;
    var qi = parseInt(el.dataset.q);
    var opt = el.dataset.opt;
    // 같은 문제 이전 선택 해제
    document.querySelectorAll("#opts"+qi+" .opt").forEach(function(o){o.className="opt";o.querySelector(".opt-check").textContent="";});
    el.className = "opt selected";
    el.querySelector(".opt-check").textContent = "✓";
    answers[qi] = opt;
    // 제출 버튼 활성화 여부
    document.getElementById("btn-submit").disabled = Object.keys(answers).length < 30;
    updateProgress();
  });
}

function updateProgress(){
  var cnt = Object.keys(answers).length;
  document.getElementById("prog").style.width = (cnt/30*100)+"%";
  document.getElementById("prog-txt").textContent = cnt+" / 30";
}

function submitAll(){
  if(submitted) return;
  submitted = true;
  var correct = 0;
  Qs.forEach(function(q,i){
    var ua = answers[i];
    var isOk = ua === q.ans;
    if(isOk) correct++;
    // 옵션 색칠
    document.querySelectorAll("#opts"+i+" .opt").forEach(function(o){
      var ov = o.dataset.opt;
      if(ov===q.ans){o.className="opt correct";o.querySelector(".opt-check").textContent="✓";}
      else if(ov===ua&&!isOk){o.className="opt wrong";o.querySelector(".opt-check").textContent="✗";}
    });
    // 피드백
    var fb = document.getElementById("fb"+i);
    if(isOk){fb.className="feedback show ok";fb.textContent="✅ 정답!";}
    else{fb.className="feedback show ng";fb.textContent="❌ 정답: "+q.ans;}
  });

  var score = Math.round(correct/30*100);
  var emoji = score>=90?"🏆":score>=70?"😊":score>=50?"😅":"😢";
  var msg = score>=90?"완벽해요! 액상 마스터!":score>=70?"잘 하셨어요!":score>=50?"조금 더 공부해봐요!":"다시 한번 도전해보세요!";

  document.getElementById("score-txt").textContent = correct+"점";
  document.getElementById("btn-row").innerHTML =
    "<div class='result-card'><div class='result-emoji'>"+emoji+"</div>"+
    "<div class='result-score'>"+correct+" / 30</div>"+
    "<div class='result-msg'>"+msg+"</div>"+
    "<div class='result-detail'>"+
    "<div><div class='num' style='color:#2a9d5c'>"+correct+"</div><div class='lbl'>정답</div></div>"+
    "<div><div class='num' style='color:#e03030'>"+(30-correct)+"</div><div class='lbl'>오답</div></div>"+
    "<div><div class='num' style='color:#2e3a8c'>"+score+"%</div><div class='lbl'>점수</div></div>"+
    "</div></div>"+
    "<button class='btn btn-retry' onclick='location.reload()'>🔄 다시 풀기</button>";
}

buildUI();
</script>
</body>
</html>
