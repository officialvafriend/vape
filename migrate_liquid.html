  var ok = 0, fail = 0;
  for(var i=0;i<DATA.length;i++){
    var d = DATA[i];
    var item = {
      id: 'liq_' + Date.now() + '_' + i,
      n: d.n, b: d.b, c: d.c,
      t: (d.t||[]).join(','),
      f: d.f
    };
    try{
      var res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({action:'save', sheet:'liquid', item:item})
      });
      var json = await res.json();
      if(json.ok){ ok++; if(i%10===0) logMsg('✅ ' + (i+1) + '/' + DATA.length + ' 진행중...', 'ok'); }
      else { fail++; logMsg('❌ ' + d.n + ' 실패', 'err'); }
    }catch(e){
      fail++;
      logMsg('❌ ' + d.n + ' 오류: ' + e.message, 'err');
    }
  }
  logMsg('--- 완료: 성공 ' + ok + ' / 실패 ' + fail + ' ---');
});
</script>
